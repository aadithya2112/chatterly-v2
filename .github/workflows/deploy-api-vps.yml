name: Deploy API (VPS)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-api-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            [ -f ~/.bashrc ] && source ~/.bashrc
            [ -f ~/.profile ] && source ~/.profile
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if [ ! -x "$HOME/.bun/bin/bun" ]; then
              echo "Bun not found for user $(whoami) at $HOME/.bun/bin/bun"
              exit 1
            fi
            "$HOME/.bun/bin/bun" --version
            cd /srv/chatterly-v2
            git fetch --all
            git reset --hard origin/main
            "$HOME/.bun/bin/bun" install --frozen-lockfile --production
            cd packages/db
            "$HOME/.bun/bin/bunx" prisma migrate deploy
            "$HOME/.bun/bin/bunx" prisma generate
            cd /srv/chatterly-v2
            sudo systemctl restart chatterly-api
            sudo systemctl status chatterly-api --no-pager
