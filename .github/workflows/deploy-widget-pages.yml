name: Deploy Widget (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/widget/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-widget-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "widget-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build widget
        run: bun run build --filter=widget

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload widget artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/widget/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
